name: Daily Dashboard Update

on:
  schedule:
    # Run daily at 08:00 UTC (after most on-chain data has settled for the day)
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest data & extend history
        run: python3 scripts/fetch-data.py --extend-history
        timeout-minutes: 5

      - name: Re-run backtest with updated history
        run: python3 scripts/backtest.py
        timeout-minutes: 3

      - name: Rebuild dashboard HTML
        run: python3 scripts/build-html.py
        timeout-minutes: 2

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history/ data/indicators.json data/backtest_results.json index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update dashboard data"
            git push
          fi
